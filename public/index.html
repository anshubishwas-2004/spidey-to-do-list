<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spidey To-Do</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark"> <main class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="spidey-card shadow-lg p-4 w-100 rounded-4 bg-white" style="max-width: 500px; border: 3px solid #e63946;">

      <header class="text-center mb-4">
        <h1 class="title spidey-title display-5 fw-bold text-danger" style="font-family: 'Bangers', cursive; letter-spacing: 2px;">
          <i class="fa-solid fa-spider"></i> Spidey Tasks
        </h1>
        <p class="text-muted small fw-semibold">With great power comes great productivity.</p>
      </header>

      <div class="input-group mb-4 shadow-sm">
        <input id="taskInput" type="text" class="form-control form-control-lg border-danger" placeholder="What's the next mission?" aria-label="Task input">
        <button class="btn btn-danger btn-lg px-4 fw-bold" onclick="addTask()">
           Thwip! <i class="fa-solid fa-bolt"></i>
        </button>
      </div>

      <ul id="taskList" class="list-group list-group-flush rounded">
        </ul>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
